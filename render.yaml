services:
  - type: web
    name: byteforge-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn byteforge.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DATABASE_URL
        fromDatabase:
          name: byteforge-db
          property: connectionString
      - key: RENDER
        value: true
      - key: DEBUG
        value: 'false'
    rootDir: backend
    plan: free

  - type: static
    name: byteforge-frontend
    runtime: static
    buildCommand: "npm install && npm run build"
    publishDir: "build"
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: byteforge-backend
          property: url
    rootDir: frontend
    plan: free

databases:
  - name: byteforge-db
    databaseName: byteforge
    user: byteforge
    plan: free
